# =============================================
#  CheckAutos - Configuracion Spring Boot
# =============================================

# Puerto del servidor
server.port=8080

# JWT - Secret y duracion del token
jwt.secret=checkautos-super-secret-key-2024-must-be-at-least-256bits-long!!
jwt.expiration.ms=86400000

# Logs
logging.level.com.checkautos=DEBUG
logging.level.org.springframework.security=WARN

# =============================================
#  MongoDB
# =============================================
# URI de conexión local (MongoDB corriendo en tu máquina)
spring.data.mongodb.uri=mongodb://localhost:27017/checkautos
spring.data.mongodb.database=checkautos